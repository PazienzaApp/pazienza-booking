name: Deploy to WordPress.org

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (es. 0.1.0). Must match Stable tag in readme.txt and Version in the main PHP file.'
        required: true
        type: string
      dry_run:
        description: 'Dry run (no SVN commit)'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blocks/booking-form/package-lock.json

      - name: Build block assets
        working-directory: blocks/booking-form
        run: |
          npm ci
          npm run build

      - name: Deploy to WordPress.org
        if: ${{ !inputs.dry_run }}
        uses: 10up/action-wordpress-org-deploy@v1
        with:
          plugin-slug: pazienza-booking
          svn-username: ${{ secrets.WPORG_SVN_USERNAME }}
          svn-password: ${{ secrets.WPORG_SVN_PASSWORD }}
          version: ${{ inputs.version }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "DRY RUN — nessun commit SVN effettuato."
          echo "Versione che sarebbe stata deployata: ${{ inputs.version }}"
